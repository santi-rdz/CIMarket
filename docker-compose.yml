services:
  backend:
    build: ./backend
    container_name: cimarket-backend
    ports:
      - '8000:8000'
    restart: always
    working_dir: /app/backend
    environment:
      CI: 'true'
      DATABASE_URL: 'mysql://cimarket_user:cimarket_password@mysql:3306/cimarket_db?charset=utf8mb4'
      DATABASE_HOST: mysql
      DATABASE_PORT: '3306'
      DATABASE_USER: cimarket_user
      DATABASE_PASSWORD: cimarket_password
      DATABASE_NAME: cimarket_db
      NODE_ENV: development
      JWT_SECRET: 'dev-only-change-in-production-k8s7d9f2m4p6q1w3e5r7t9y0u2i4o6a8'
      GOOGLE_CLIENT_ID: '140981650188-13cgvaf5oqc5v82rkim1bg3rben2p3qc.apps.googleusercontent.com'
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:dev@cimarket.mx}
      CORS_ORIGINS: 'http://localhost:5173,http://127.0.0.1:5173,http://frontend:5173'
      JSON_BODY_LIMIT: '1mb'
      RATE_LIMIT_WINDOW_MS: '900000'
      RATE_LIMIT_MAX: '300'
      AUTH_RATE_LIMIT_WINDOW_MS: '900000'
      AUTH_RATE_LIMIT_MAX: '20'
    volumes:
      - ./:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "pnpm install && pnpm run prisma:generate && pnpm run db:push && pnpm run db:seed && pnpm run dev"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cimarket-network

  mysql:
    image: mysql:8.0
    container_name: cimarket-mysql
    restart: always
    command: ['--character-set-server=utf8mb4', '--collation-server=utf8mb4_unicode_ci']
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: cimarket_db
      MYSQL_USER: cimarket_user
      MYSQL_PASSWORD: cimarket_password
    ports:
      - '3306:3306'
    volumes:
      - cimarket_db_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          'localhost',
          '-u',
          'cimarket_user',
          '-pcimarket_password',
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - cimarket-network

volumes:
  cimarket_db_data:
  backend_node_modules:

networks:
  cimarket-network:
    driver: bridge
